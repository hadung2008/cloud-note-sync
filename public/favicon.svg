<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (vintage paper) -->
  <rect width="64" height="64" fill="#F8F5E6" rx="4"/>
  
  <!-- Notebook border -->
  <rect x="8" y="8" width="48" height="48" fill="none" stroke="#2C2A29" stroke-width="2.5" rx="3"/>
  
  <!-- Left spine (classic notebook binding) -->
  <line x1="16" y1="8" x2="16" y2="56" stroke="#2C2A29" stroke-width="2"/>
  
  <!-- Page lines (ruled paper effect) -->
  <line x1="20" y1="18" x2="52" y2="18" stroke="#B09B74" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="28" x2="52" y2="28" stroke="#B09B74" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="38" x2="52" y2="38" stroke="#B09B74" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="48" x2="52" y2="48" stroke="#B09B74" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Pen mark / writing indicator -->
  <path d="M 22 22 Q 30 28 38 24" stroke="#2C2A29" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Decorative corner fold -->
  <path d="M 48 8 L 56 8 L 48 16 Z" fill="#EBE5D0" stroke="#2C2A29" stroke-width="1.5"/>
</svg>